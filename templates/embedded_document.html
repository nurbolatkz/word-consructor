<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Embedded Document</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #fff;
    }

    .viewer {
      display: block;
      width: 100%;
      height: 100vh;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <iframe class="viewer" src="/documents/{{ document.id }}/edit?embed=1" title="Browser editor"></iframe>
</body>
</html>
