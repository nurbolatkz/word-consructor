<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browser Editor</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --line: #d6dde5;
      --text: #142433;
      --muted: #5c6b7a;
      --accent: #1f4b7a;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef2f6 0%, var(--bg) 180px);
    }

    .shell {
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    .frame {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .meta h1 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.3;
    }

    .meta p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .topbar a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-send {
      padding: 9px 16px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-send:disabled {
      opacity: .6;
      cursor: default;
    }

    .editor-shell {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow);
    }

    #editor {
      height: 100%;
      width: 100%;
    }

    body.embed {
      background: #fff;
    }

    body.embed .shell {
      padding: 0;
    }

    body.embed .editor-shell {
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }
  </style>
</head>
<body class="{% if embed_mode %}embed{% endif %}">
  <div class="shell">
    <div class="frame">
      {% if not embed_mode %}
      <div class="topbar">
        <div class="meta">
          <h1>{{ document.original_name }}</h1>
          <p>Документ открыт в браузерном редакторе</p>
        </div>
        <div class="actions">
          <button class="btn-send" id="sendTo1cBtn" style="display:none">Отправить в 1С</button>
          <a href="/services/doc-editor">← Назад к сервису</a>
        </div>
      </div>
      {% endif %}
      <div class="editor-shell">
        <div id="editor"></div>
      </div>
    </div>
  </div>

  <script src="/onlyoffice/web-apps/apps/api/documents/api.js"></script>
  <script>
    const documentId = {{ document.id | tojson }};
    const bridgeId = new URLSearchParams(window.location.search).get('bridge_id');

    async function loadEditor() {
      const response = await fetch(`/api/documents/${documentId}/onlyoffice/config`);
      const config = await response.json();
      new DocsAPI.DocEditor('editor', config);
    }

    async function sendTo1C() {
      const btn = document.getElementById('sendTo1cBtn');
      btn.disabled = true;
      btn.textContent = 'Отправка...';
      try {
        const response = await fetch(`/api/1c/bridge/${bridgeId}/complete`, { method: 'POST' });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || `HTTP ${response.status}`);
        }
        btn.textContent = 'Отправлено';
      } catch (error) {
        btn.disabled = false;
        btn.textContent = 'Отправить в 1С';
        alert(error.message || 'Не удалось отправить документ в 1С');
      }
    }

    if (bridgeId) {
      const btn = document.getElementById('sendTo1cBtn');
      if (btn) {
        btn.style.display = 'inline-block';
        btn.addEventListener('click', sendTo1C);
      }
    }

    loadEditor();
  </script>
</body>
</html>
