services:

  # ── Flask / Gunicorn application ─────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-kazuni-onlyoffice-secret}
      # OnlyOffice calls back to this URL when saving documents.
      # Inside Docker Compose both containers share the "kazuni" network,
      # so we use the service name instead of host.docker.internal.
      ONLYOFFICE_INTERNAL_BASE_URL: http://app:8016
      PYTHONUNBUFFERED: "1"
    volumes:
      - app_storage:/tmp/kazuni_word_constructor
      - ../google-api-secrets.json:/app/google-api-secrets.json:ro
    depends_on:
      onlyoffice:
        condition: service_healthy
    networks:
      - kazuni

  # ── OnlyOffice Document Server ────────────────────────────────────────────
  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-kazuni-onlyoffice-secret}
      JWT_HEADER: Authorization
      JWT_IN_BODY: "true"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice
      - onlyoffice_db:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - kazuni

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount Let's Encrypt certs if HTTPS is needed:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - onlyoffice
    networks:
      - kazuni

volumes:
  app_storage:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_cache:
  onlyoffice_db:

networks:
  kazuni:
    driver: bridge
